# Gitleaks Configuration for Wormhole
# This configuration helps prevent accidental credential leaks

title = "Gitleaks Configuration for Wormhole"

[extend]
useDefault = true

[allowlist]
description = "Allowlist for known test/dev keys and false positives"
paths = [
  # Test and development key files that are intentionally committed
  '''node/hack/query/dev.guardian.key''',
  '''node/hack/query/querier.key''',
  '''node/hack/accountant/dev.guardian.key''',
  '''node/hack/accountant/dev.wormchain.key''',
  '''node/cmd/ccq/devnet.p2p.key''',
  '''node/cmd/ccq/devnet.signing.key''',
  '''node/pkg/query/dev.guardian.key''',
  # Sui test network configurations
  '''sui/testing/sui_config/network.yaml''',
  '''sui/devnet/network.yaml''',
  '''sui/devnet/fullnode.yaml''',
  # Test files
  '''.*_test\.go''',
  '''.*_test\.ts''',
  '''.*\.test\.ts''',
  '''.*\.test\.js''',
  '''.*/test/.*''',
  '''.*/tests/.*''',
  '''.*/testing/.*''',
  # Mock and example files
  '''.*/mock/.*''',
  '''.*/example/.*''',
  '''.*\.sample''',
  '''.*\.example''',
]

regexes = [
  # Known test private keys - Anvil default accounts
  '''4f3edf983ac636a65a842ce7c78d9aa706d3b113bce9c46f30d7d21715b23b1d''',
  '''ac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80''',
  '''59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d''',
  '''5de4111afa1a4b94908f83103eb1f1706367c2e68ca870fc3fb9a804cdab365a''',
  # Known devnet guardian addresses
  '''0xbeFA429d57cD18b7F8A4d91A2da9AB4AF05d0FBe''',
  # Algorand sandbox tokens (64 'a' characters)
  '''aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa''',
  # Test Solana tokens
  '''2WDq7wSs9zYrpx2kbHDA4RUTRch2CCTP6ZWaH4GNfnQQ''',
  '''BVxyYhm498L79r4HMQ9sxZ5bi41DmJmeWZ7SCS7Cyvna''',
