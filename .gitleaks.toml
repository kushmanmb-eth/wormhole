# Custom rules specific to blockchain development
[[rules]]
id = "ethereum-private-key"
description = "Ethereum Private Key"
regex = '''(?i)(\b[0-9a-f]{64}\b)'''
tags = ["key", "ethereum"]
[rules.allowlist]
paths = [
  '''.*_test\.(ts|js|go)''',
  '''.*\.test\.(ts|js)''',
  '''.*/consts\.(ts|js)''',
  '''.*/mock/.*''',
  '''ethereum/\.env\.test''',
]
regexes = [
  # Known test keys
  '''4f3edf983ac636a65a842ce7c78d9aa706d3b113bce9c46f30d7d21715b23b1d''',
  '''ac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80''',
]

[[rules]]
id = "aws-access-key"
description = "AWS Access Key ID"
regex = '''(A3T[A-Z0-9]|AKIA|AGPA|AIDA|AROA|AIPA|ANPA|ANVA|ASIA)[A-Z0-9]{16}'''
tags = ["key", "aws"]
[rules.allowlist]
paths = [
  '''sui/testing/sui_config/network.yaml''',
  '''sui/devnet/network.yaml''',
]

[[rules]]
id = "github-pat"
description = "GitHub Personal Access Token"
regex = '''ghp_[0-9a-zA-Z]{36}'''
tags = ["key", "github"]

[[rules]]
id = "github-oauth"
description = "GitHub OAuth Token"
regex = '''gho_[0-9a-zA-Z]{36}'''
tags = ["key", "github"]

[[rules]]
id = "github-app-token"
description = "GitHub App Token"
regex = '''(ghu|ghs)_[0-9a-zA-Z]{36}'''
tags = ["key", "github"]

[[rules]]
id = "slack-token"
description = "Slack Token"
regex = '''xox[baprs]-([0-9a-zA-Z]{10,48})'''
tags = ["key", "slack"]

[[rules]]
id = "slack-webhook"
description = "Slack Webhook"
regex = '''https://hooks\.slack\.com/services/T[a-zA-Z0-9_]{8}/B[a-zA-Z0-9_]{8}/[a-zA-Z0-9_]{24}'''
tags = ["key", "slack"]

[[rules]]
id = "generic-api-key"
description = "Generic API Key"
regex = '''(?i)(api[_-]?key|apikey|api[_-]?secret)['":\s=]+([0-9a-zA-Z\-_]{20,})'''
tags = ["key", "api"]
[rules.allowlist]
paths = [
  '''.*_test\.(ts|js|go)''',
  '''.*\.test\.(ts|js)''',
  '''.*/mock/.*''',
]
regexes = [
  '''2d6c22c6-afae-4e54-b36d-5ba118da646a''',
]

[[rules]]
id = "private-key-header"
description = "Private Key File Header"
regex = '''-----BEGIN (RSA |EC |OPENSSH |DSA |PGP )?PRIVATE KEY-----'''
tags = ["key", "private"]
[rules.allowlist]
paths = [
  '''node/hack/.*\.key''',
  '''node/cmd/ccq/.*\.key''',
  '''node/pkg/query/.*\.key''',
]

[[rules]]
id = "connection-string-password"
description = "Database Connection String with Password"
regex = '''(?i)(jdbc|mongodb(\+srv)?|mysql|postgresql|postgres)://[^:]+:[^@]+@'''
tags = ["key", "database"]

[[rules]]
id = "http-basic-auth"
description = "HTTP Basic Authentication in URL"
regex = '''https?://[^:]+:[^@]+@[^\s"']+'''
tags = ["key", "http"]
[rules.allowlist]
regexes = [
  '''localhost''',
  '''127\.0\.0\.1''',
  '''example\.com''',
]
